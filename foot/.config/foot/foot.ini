# Foot terminal configuration (converted from Alacritty config, adhering to Foot syntax)
[main]
font=JetBrainsMono Nerd Font:size=12
term=tmux-256color
app-id=foot
dpi-aware=no
bold-text-in-bright=no
initial-window-size-pixels=1100x700

[scrollback]
lines=20000
multiplier=3.0
indicator-position=relative
indicator-format=percentage

[colors-dark]
background=2E3440
foreground=D8DEE9

regular0=3B4252
regular1=BF616A
regular2=A3BE8C
regular3=EBCB8B
regular4=81A1C1
regular5=B48EAD
regular6=88C0D0
regular7=E5E9F0

bright0=4C566A
bright1=BF616A
bright2=A3BE8C
bright3=EBCB8B
bright4=81A1C1
bright5=B48EAD
bright6=8FBCBB
bright7=ECEFF4

selection-foreground=D8DEE9
selection-background=4C566A

alpha=1.0

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes
alternate-scroll-mode=no

[key-bindings]
clipboard-copy=Control+Shift+C
clipboard-paste=Control+Shift+V
search-start=Control+Shift+F
font-reset=Control+0
